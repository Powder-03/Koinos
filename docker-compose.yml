services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: koinos
      POSTGRES_PASSWORD: password
      POSTGRES_DB: koinos_db
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://koinos:password@db:5432/koinos_db
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - db
    volumes:
      - .:/app
volumes:
  db_data:
